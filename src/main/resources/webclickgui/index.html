<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oxevy ClickGui</title>
  <link rel="stylesheet" href="/style.css" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = {
  async getState() {
    const r = await fetch("/api/state");
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async toggle(mod) {
    const r = await fetch("/api/module/toggle", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({module:mod}) });
    return r.json();
  },
  async setSetting(mod, setting, value) {
    const r = await fetch("/api/setting", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({module:mod, setting, value}) });
    return r.json();
  }
};

function Sidebar({ categories, activeKey, onSelect }) {
  return (
    <aside className="sidebar">
      <div className="brand">
        <div className="brand-mark">OX</div>
      </div>
      <div className="sidebar-list">
        {categories.map(cat => (
          <button key={cat.key} className={"sidebar-item"+(cat.key===activeKey?" active":"")} onClick={()=>onSelect(cat.key)} title={cat.name}>
            {cat.name.slice(0,2).toUpperCase()}
            {cat.enabledCount>0&&<span className="sidebar-count">{cat.enabledCount>9?"9+":cat.enabledCount}</span>}
          </button>
        ))}
      </div>
    </aside>
  );
}

function Toggle({ enabled, onClick }) {
  return <button className={"toggle"+(enabled?" on":"")} onClick={onClick}><span className="toggle-thumb" /></button>;
}

function KeybindBadge({ label }) {
  if (!label||label==="None") return null;
  return <span className="badge">{label}</span>;
}

function ModuleCard({ mod, selected, onToggle, onSelect }) {
  return (
    <div className={"card"+(mod.enabled?" on":"")+(selected?" selected":"")}>
      <div className="card-main">
        <Toggle enabled={mod.enabled} onClick={onToggle} />
        <div className="card-body" onClick={onSelect}>
          <strong>{mod.name}</strong>
          {mod.description&&<span>{mod.description}</span>}
        </div>
      </div>
      <div className="card-extra">
        <KeybindBadge label={mod.bind.label} />
        <button className="btn-icon" onClick={onSelect} title="Settings">{">"}</button>
      </div>
    </div>
  );
}

function BoolSetting({ setting, onChange }) {
  return (
    <div className="setting">
      <span>{setting.name}</span>
      <Toggle enabled={setting.value} onClick={()=>onChange(!setting.value)} />
    </div>
  );
}

function NumSetting({ setting, onChange }) {
  const [v,setV]=useState(setting.value);
  useEffect(()=>setV(setting.value),[setting.value]);
  const commit=()=>onChange(Number(v));
  return (
    <div className="setting">
      <span>{setting.name} <em>{Number(v).toFixed(setting.step===1?0:1)}</em></span>
      <input type="range" min={setting.min} max={setting.max} step={setting.step} value={v} onChange={e=>setV(e.target.value)} onMouseUp={commit} onTouchEnd={commit} />
    </div>
  );
}

function StrSetting({ setting, onChange }) {
  const [v,setV]=useState(setting.value);
  useEffect(()=>setV(setting.value),[setting.value]);
  const commit=()=>onChange(v);
  return <div className="setting"><span>{setting.name}</span><input type="text" value={v} onChange={e=>setV(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==="Enter"&&commit()} /></div>;
}

function EnumSetting({ setting, onChange }) {
  return <div className="setting"><span>{setting.name}</span><select value={setting.value} onChange={e=>onChange(e.target.value)}>{setting.options.map(o=><option key={o} value={o}>{o}</option>)}</select></div>;
}

function ColorSetting({ setting, onChange }) {
  const rows=[["r","#ff5a5a"],["g","#5aff96"],["b","#5aaaff"],["a","#dcdcdc"]];
  return (
    <div className="setting">
      <span>{setting.name}</span>
      {rows.map(([c,cl])=>(
        <div key={c} className="color-row">
          <span className="swatch" style={{background:cl}}></span>
          <input type="range" min={0} max={255} step={1} value={setting.value[c]} onChange={e=>{const n={...setting.value,[c]:Number(e.target.value)};onChange(n)}} />
          <span>{setting.value[c]}</span>
        </div>
      ))}
    </div>
  );
}

function BindSetting({ setting, onChange }) {
  const [capture,setCapture]=useState(false);
  useEffect(()=>{
    if(!capture)return;
    const h=e=>{
      e.preventDefault();
      const map={Space:32,Escape:256,Enter:257,NumpadEnter:257,Tab:258,Backspace:259,Insert:260,Delete:261,ArrowRight:262,ArrowLeft:263,ArrowDown:264,ArrowUp:265,ShiftLeft:340,ShiftRight:344,ControlLeft:341,ControlRight:345,AltLeft:342,AltRight:346};
      const k=map[e.code]??(e.code.startsWith("Key")?e.code.charCodeAt(3):e.code.startsWith("Digit")?e.code.charCodeAt(5):null);
      if(k!=null){setCapture(false);onChange({key:k})}
    };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  },[capture]);
  return (
    <div className="setting">
      <span>{setting.name} <em>{setting.value.label}</em></span>
      <div className="setting-actions">
        <button className="btn" onClick={()=>setCapture(true)}>{capture?"Press key...":"Set"}</button>
        <button className="btn" onClick={()=>onChange({key:-1})}>Clear</button>
      </div>
    </div>
  );
}

function SettingsDrawer({ mod, onToggle, onSettingChange, onClose }) {
  useEffect(()=>{
    if(!mod)return;
    const h=e=>{if(e.key==="Escape")onClose()};
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  },[mod,onClose]);
  if(!mod)return<aside className="drawer"><div className="drawer-empty">Select a module</div></aside>;
  return (
    <aside className="drawer">
      <div className="drawer-head"><h2>{mod.name}</h2><button className="btn-icon" onClick={onClose}>X</button></div>
      <div className="drawer-body">
        <div className="setting"><span>Status</span><Toggle enabled={mod.enabled} onClick={()=>onToggle(mod.id)} /></div>
        {mod.settings.map(s=>{
          const onC=(v)=>onSettingChange(mod.id,s.id,v);
          switch(s.type){
            case"boolean":return<BoolSetting key={s.id} setting={s} onChange={onC}/>;
            case"number":return<NumSetting key={s.id} setting={s} onChange={onC}/>;
            case"string":return<StrSetting key={s.id} setting={s} onChange={onC}/>;
            case"enum":return<EnumSetting key={s.id} setting={s} onChange={onC}/>;
            case"color":return<ColorSetting key={s.id} setting={s} onChange={onC}/>;
            case"bind":return<BindSetting key={s.id} setting={s} onChange={onC}/>;
            default:return null;
          }
        })}
      </div>
    </aside>
  );
}

function MainPanel({ categories, activeKey, selectedId, onToggle, onSelectModule, search, onSearch }) {
  const cat=categories.find(c=>c.key===activeKey);
  const raw=cat?cat.modules:[];
  const q=search.trim().toLowerCase();
  const mods=q?raw.filter(m=>m.name.toLowerCase().includes(q)||(m.description&&m.description.toLowerCase().includes(q))):raw;
  const enabledCount=raw.filter(m=>m.enabled).length;
  return (
    <section className="main-panel">
      <div className="panel-head">
        <div><h1>{cat?cat.name:"Modules"}</h1><p>{enabledCount}/{raw.length} enabled</p></div>
      </div>
      <div className="search-wrap"><input className="search" type="text" placeholder="Search modules" value={search} onChange={e=>onSearch(e.target.value)} />{search&&<button className="search-clear" onClick={()=>onSearch("")}>✕</button>}</div>
      <div className="module-list">
        {mods.length===0?<div className="empty">No modules match</div>:mods.map(m=><ModuleCard key={m.id} mod={m} selected={m.id===selectedId} onToggle={()=>onToggle(m.id)} onSelect={()=>onSelectModule(m.id)} />)}
      </div>
    </section>
  );
}

function App() {
  const [data,setData]=useState(null);
  const [activeKey,setActiveKey]=useState(null);
  const [selectedId,setSelectedId]=useState(null);
  const [search,setSearch]=useState("");

  const load=useCallback(async()=>{
    try{const d=await API.getState();setData(d);if(!activeKey&&d.categories.length)setActiveKey(d.categories[0].key);}catch(e){console.error(e)}
  },[activeKey]);

  useEffect(()=>{load()},[load]);

  useEffect(()=>{const i=setInterval(load,2000);return ()=>clearInterval(i)},[load]);

  const hToggle=useCallback(async(id)=>{setData(await API.toggle(id));},[]);
  const hSetting=useCallback(async(modId,setId,val)=>{setData(await API.setSetting(modId,setId,val));},[]);
  const hSelect=useCallback((id)=>{setSelectedId(p=>p===id?null:id);},[]);
  const hCategory=useCallback((k)=>{setActiveKey(k);setSelectedId(null);},[]);

  if(!data)return <div className="loading">Connecting to Oxevy...</div>;

  const findMod=(id)=>{for(const c of data.categories){const m=c.modules.find(x=>x.id===id);if(m)return m;}return null;};

  return (
    <div className="shell">
      <Sidebar categories={data.categories} activeKey={activeKey} onSelect={hCategory} />
      <MainPanel categories={data.categories} activeKey={activeKey} selectedId={selectedId} onToggle={hToggle} onSelectModule={hSelect} search={search} onSearch={setSearch} />
      <SettingsDrawer mod={findMod(selectedId)} onToggle={hToggle} onSettingChange={hSetting} onClose={()=>setSelectedId(null)} />
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
