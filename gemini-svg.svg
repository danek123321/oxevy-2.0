<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Importing DynaPuff from Google Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=DynaPuff:wght@700&amp;display=swap');
      
      .logo-text {
        font-family: 'DynaPuff', system-ui, sans-serif;
        font-weight: 700;
        font-size: 170px;
        fill: #5dfcba;
        text-anchor: middle;
        letter-spacing: -2px;
      }
    </style>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Container -->
  <rect x="50" y="80" width="700" height="240" rx="120" ry="120" fill="black" />

  <!-- Logo Text with DynaPuff -->
  <text x="400" y="245" class="logo-text" filter="url(#neonGlow)">
    oxevy
  </text>
</svg>
